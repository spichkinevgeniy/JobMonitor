services:
  db:
    container_name: job_monitor_db
    restart: always
    ports:
      - "5433:5432"

  app:
    container_name: job_monitor_app
    restart: always
    environment:
      APP_ENV: development
      SENTRY_ENV: development
      LOGFIRE_ENV: development

  pgadmin:
    image: dpage/pgadmin4
    container_name: job_monitor_pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - db
