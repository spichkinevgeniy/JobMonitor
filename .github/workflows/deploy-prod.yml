name: Deploy Production

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Branch or tag to deploy"
        required: true
        default: "main"

permissions:
  contents: read

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: .python-version

      - name: Sync dependencies
        run: uv sync --dev --frozen

      - name: Run quality gate
        run: make quality

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script_stop: true
          script: |
            set -e
            DEPLOY_REF="${{ github.event.inputs.ref }}"
            cd "${{ secrets.VPS_APP_DIR }}"
            git fetch --all --prune --tags
            git checkout "$DEPLOY_REF"
            if git show-ref --verify --quiet "refs/remotes/origin/$DEPLOY_REF"; then
              git pull --ff-only origin "$DEPLOY_REF"
            else
              echo "Ref '$DEPLOY_REF' is not a remote branch; skipping git pull."
            fi
            echo "Server commit: $(git rev-parse --short HEAD)"
            make prod-deploy
