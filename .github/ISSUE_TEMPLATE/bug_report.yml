name: Bug Report
description: Report a reproducible problem in JobMonitor
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the bug and the expected behavior.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Provide a minimal sequence of steps.
      placeholder: |
        1. Go to ...
        2. Run ...
        3. Observe ...
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version or commit
      description: Tag, branch, or commit hash

  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Remove secrets and private data before posting.
